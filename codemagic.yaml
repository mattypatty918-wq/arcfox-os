# Codemagic CI/CD for ArcFox OS
# App: https://github.com/mattypatty918-wq/arcfox-os

workflows:
  ios-workflow:
    name: ArcFox OS iOS Build
    max_build_duration: 60
    environment:
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: com.arcfox.os
      xcode: latest
      cocoapods: true
    stages:
      - name: Checkout
        script: |
          cd $CM_BUILD_DIR
          ls -la
      - name: Install dependencies
        script: |
          cd $CM_BUILD_DIR
          if [ -f "Podfile" ]; then
            pod install
          fi
      - name: Generate Xcode project
        script: |
          cd $CM_BUILD_DIR
          if [ -f "project.yml" ]; then
            xcodegen generate || echo "XcodeGen not available"
          fi
          ls -la
      - name: Build
        script: |
          cd $CM_BUILD_DIR
          xcodebuild -project *.xcodeproj -scheme ArcFoxOS -configuration Debug -destination 'platform=iOS Simulator,name=iPhone 16' build CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO 2>&1 | tail -30
    artifacts:
      - build/ios/ipa/*.ipa
      - build/**/*.xcarchive
    publishing:
      email:
        recipients:
          - mattypatty918@gmail.com