# Codemagic CI/CD for ArcFox OS
workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      vars:
        XCODE_VERSION: "16.0"
        APP_NAME: arcfox-os
    triggering:
      branch_patterns:
        - pattern: master
          include: true
    scripts:
      - git clone https://github.com/mattypatty918-wq/arcfox-os.git --depth 1
      - cd arcfox-os && git submodule update --init --recursive
      - cd arcfox-os && xcode-project fetch-dependencies --use-cache
      - cd arcfox-os && xcode-project build --workspace ArcFoxOS.xcodeproj --scheme ArcFoxOS --configuration Release
    artifacts:
      - arcfox-os/*.ipa
    publishing:
      app_store_connect:
        api_key: Whitefoxes